name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  # Manuell von jedem Branch aus startbar (Actions → Deploy PWA → Run workflow)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx jest --ci

      - name: Export PWA
        run: npx expo export --platform web
        env:
          # Project Pages liegen unter https://<user>.github.io/<repo>/
          EXPO_BASE_URL: /${{ github.event.repository.name }}

      - name: Pages-Feinschliff
        run: |
          # Jekyll würde das _expo-Verzeichnis (Unterstrich!) ignorieren
          touch dist/.nojekyll
          # SPA-Fallback für unbekannte Pfade
          cp dist/index.html dist/404.html

      # Voraussetzung (einmalig): Repo → Settings → Pages →
      # Build and deployment → Source: „GitHub Actions".
      # Der Workflow-Token darf Pages nicht selbst aktivieren, daher wird
      # die vorhandene Konfiguration hier nur ausgelesen (kein enablement).
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
